version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - SFTP_HOST=sftp
      - SFTP_PORT=22
      - SFTP_USER=testuser
      - SFTP_PASSWORD=testpass
    depends_on:
      sftp:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5

  sftp:
    image: atmoz/sftp
    command: testuser:testpass:::upload
    ports:
      - "2222:22"
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/22' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
